<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geográfico SITP</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                    <line x1="9" y1="3" x2="9" y2="18"></line>
                    <line x1="15" y1="6" x2="15" y2="21"></line>
                </svg>
                <h1>Visor SITP Paraderos</h1>
            </div>
            <div class="stats">
                <span id="paraderos-count" class="badge">Cargando...</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Sidebar info -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Información del Paradero</h2>
                    <p class="subtitle">Selecciona un punto en el mapa para ver sus detalles.</p>
                </div>
                
                <div id="info-panel" class="info-panel empty-state">
                    <div class="empty-icon">📍</div>
                    <p>No hay ningún paradero seleccionado.</p>
                </div>
            </aside>

            <!-- Map Container -->
            <div class="map-wrapper">
                <div id="map"></div>
                
                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                    <p>Cargando datos geográficos...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom Script -->
    <script src="./app.js"></script>
</body>
</html>
